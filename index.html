<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consciousness Model v2.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
:root {
  --bg:#0C0C0E;--bg-card:#141418;--bg-hover:#1A1A20;
  --text:#C8C8D0;--text-dim:#6E6E7A;--text-bright:#EAEAF0;
  --accent:#4ECDC4;--accent-dim:rgba(78,205,196,0.12);--accent2:#FF6B6B;
  --t1:#2ecc71;--t1-bg:rgba(46,204,113,0.13);--t1-border:rgba(46,204,113,0.3);
  --t2:#f39c12;--t2-bg:rgba(243,156,18,0.13);--t2-border:rgba(243,156,18,0.3);
  --t3:#e74c3c;--t3-bg:rgba(231,76,60,0.13);--t3-border:rgba(231,76,60,0.3);
  --border:rgba(255,255,255,0.06);--border-accent:rgba(78,205,196,0.2);
  --serif:'Newsreader',Georgia,serif;--mono:'DM Mono','Menlo',monospace;
  --max-w:720px;--gutter:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:17px;line-height:1.75;-webkit-font-smoothing:antialiased;min-height:100vh}
::selection{background:rgba(78,205,196,0.25);color:var(--text-bright)}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(12,12,14,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:transform .3s ease}
nav.hidden{transform:translateY(-100%)}
.nav-inner{max-width:var(--max-w);margin:0 auto;padding:12px var(--gutter);display:flex;align-items:center;gap:10px}
.nav-home{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);text-decoration:none;white-space:nowrap;cursor:pointer;transition:opacity .2s}
.nav-home:hover{opacity:.7}
.nav-sep{color:var(--text-dim);font-family:var(--mono);font-size:12px}
.nav-crumb{font-family:var(--mono);font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-spacer{flex:1}
.nav-edit{font-family:var(--mono);font-size:12px;color:var(--text-dim);text-decoration:none;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;transition:all .2s;white-space:nowrap}
.nav-edit:hover{color:var(--accent);border-color:var(--border-accent)}
.nav-edit svg{width:13px;height:13px}
.nav-v{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap;margin-left:8px}

.page{max-width:var(--max-w);margin:0 auto;padding:76px var(--gutter) 80px;min-height:100vh}
.page.fade-in{animation:fadeIn .35s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.back-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:13px;color:var(--accent);text-decoration:none;margin-bottom:24px;cursor:pointer;transition:opacity .2s}
.back-link:hover{opacity:.7}
.back-link svg{width:14px;height:14px}

.tier{display:inline-block;font-family:var(--mono);font-size:12px;font-weight:500;padding:4px 11px;border-radius:5px;margin:2px 2px;letter-spacing:.02em;vertical-align:middle;line-height:1.4}
.tier-1{background:var(--t1-bg);color:var(--t1);border:1px solid var(--t1-border)}
.tier-2{background:var(--t2-bg);color:var(--t2);border:1px solid var(--t2-border)}
.tier-3{background:var(--t3-bg);color:var(--t3);border:1px solid var(--t3-border)}

.tier-cards{display:grid;gap:12px;margin:20px 0}
.tier-card{background:var(--bg-card);border-radius:12px;padding:18px 20px;border:1px solid var(--border);cursor:pointer;transition:all .2s;text-decoration:none;display:block}
.tier-card:hover{border-color:var(--border-accent);background:var(--bg-hover);transform:translateY(-1px)}
.tier-card-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tier-card-count{font-family:var(--mono);font-size:24px;font-weight:300}
.tier-card-label{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase}
.tier-card p{font-size:14px;color:var(--text-dim);margin:0;line-height:1.6}
.tier-card[data-t="1"] .tier-card-label,.tier-card[data-t="1"] .tier-card-count{color:var(--t1)}
.tier-card[data-t="1"]{border-left:3px solid var(--t1)}
.tier-card[data-t="2"] .tier-card-label,.tier-card[data-t="2"] .tier-card-count{color:var(--t2)}
.tier-card[data-t="2"]{border-left:3px solid var(--t2)}
.tier-card[data-t="3"] .tier-card-label,.tier-card[data-t="3"] .tier-card-count{color:var(--t3)}
.tier-card[data-t="3"]{border-left:3px solid var(--t3)}

.md h1{font-family:var(--serif);font-size:clamp(28px,6vw,42px);font-weight:300;color:var(--text-bright);line-height:1.2;margin:0 0 8px;padding-bottom:16px}
.md h2{font-family:var(--serif);font-size:clamp(21px,4.5vw,27px);font-weight:400;color:var(--text-bright);line-height:1.3;margin:48px 0 16px;padding-top:32px;border-top:1px solid var(--border)}
.md h3{font-family:var(--serif);font-size:19px;font-weight:500;color:var(--text-bright);margin:32px 0 10px}
.md h4{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.04em;margin:24px 0 8px}
.md p{margin:0 0 16px}.md ul,.md ol{margin:0 0 16px;padding-left:22px}.md li{margin-bottom:6px}.md li::marker{color:var(--accent)}
.md strong{color:var(--text-bright);font-weight:600}.md em{font-style:italic;color:var(--accent)}
.md hr{border:none;border-top:1px solid var(--border);margin:40px 0}
.md blockquote{border-left:3px solid var(--accent2);padding:8px 0 8px 20px;margin:20px 0;color:var(--text-dim);font-style:italic}
.md blockquote p:last-child{margin-bottom:0}
.md code{font-family:var(--mono);font-size:.88em;background:rgba(78,205,196,.08);color:var(--accent);padding:2px 6px;border-radius:4px}
.md pre{background:rgba(78,205,196,.05);border:1px solid rgba(78,205,196,.12);border-radius:10px;padding:16px 20px;margin:20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.md pre code{background:none;padding:0;font-size:13px;line-height:1.6;color:var(--accent)}
.md table{width:100%;border-collapse:collapse;font-size:14px;margin:20px 0;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
.md thead{border-bottom:1px solid var(--border-accent)}
.md th{font-family:var(--mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);text-align:left;padding:10px 12px;white-space:nowrap}
.md td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.md tr:last-child td{border-bottom:none}
.md a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(78,205,196,.25);transition:border-color .2s}
.md a:hover{border-color:var(--accent)}
.page[data-page="home"] .md table{display:table;border-collapse:separate;border-spacing:0 4px}
.page[data-page="home"] .md td{background:var(--bg-card);border-bottom:none;padding:12px 16px;transition:background .2s;cursor:pointer}
.page[data-page="home"] .md td:first-child{border-radius:8px 0 0 8px;font-weight:500}
.page[data-page="home"] .md td:last-child{border-radius:0 8px 8px 0;color:var(--text-dim);font-size:15px}
.page[data-page="home"] .md tr:hover td{background:var(--bg-hover)}
.page[data-page="home"] .md th{padding:6px 16px}
.loader{display:flex;align-items:center;justify-content:center;gap:8px;padding:140px 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.4;animation:ldot 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes ldot{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:.8}}
.error-box{text-align:center;padding:120px var(--gutter);font-family:var(--mono);font-size:14px;color:var(--accent2)}
.foot{max-width:var(--max-w);margin:0 auto;padding:32px var(--gutter) 64px;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--text-dim);text-align:center}
@media(max-width:480px){:root{--gutter:16px}body{font-size:16px}.md table{font-size:13px}.md th,.md td{padding:8px}.page{padding-top:68px}.nav-edit span{display:none}.nav-v{display:none}}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-inner">
    <a class="nav-home" onclick="go('');return false" href="#">Consciousness Model</a>
    <span class="nav-sep" id="navSep" style="display:none">/</span>
    <span class="nav-crumb" id="navCrumb"></span>
    <span class="nav-spacer"></span>
    <a class="nav-edit" id="navEdit" href="#" target="_blank" style="display:none">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/></svg>
      <span>Edit</span>
    </a>
    <span class="nav-v">v2.3</span>
  </div>
</nav>

<main class="page fade-in" id="page" data-page="home"></main>

<footer class="foot">Polášek + Claude · March 2026 · Not peer-reviewed science.</footer>

<script>
// CONFIG — change to your GitHub repo
var GITHUB_REPO = 'https://github.com/USER/consciousness-model';
var GITHUB_BRANCH = 'main';

var TITLES = {
  '':'Consciousness Model v2.3',
  'docs/01-core-model':'Core Model','docs/02-three-modes':'Three Modes',
  'docs/03-hierarchy':'Hierarchy','docs/04-predictive-loop':'Predictive Loop',
  'docs/05-synchronization':'Synchronization','docs/06-calibration':'Calibration',
  'docs/07-gradient-descent':'Gradient Descent','docs/08-existing-theories':'Existing Theories',
  'docs/09-esotericism':'Esotericism','docs/10-evidence-tiers':'Evidence Tiers',
  'docs/11-open-questions':'Open Questions','docs/12-peer-review':'Peer Review',
  'CHANGELOG':'Changelog'
};

var TIER_DATA = {
  1:{label:'Tier 1 — Strong Evidence',desc:'Supported by meta-analyses, replicated experiments, or established frameworks.',items:[
    {claim:'Brain as prediction machine',refs:'Friston (FEP), Seth, Clark',doc:'docs/01-core-model'},
    {claim:'Emotions as fundamental encoding system',refs:'Damasio, Barrett',doc:'docs/04-predictive-loop'},
    {claim:'Autonomous reflex arcs',refs:'Standard neuroanatomy — 25–50ms',doc:'docs/03-hierarchy'},
    {claim:'Spinal transection blunts emotions',refs:'Hohmann (1966)',doc:'docs/01-core-model'},
    {claim:'DMN deactivation in meditation',refs:'Brewer et al. (2011, PNAS)',doc:'docs/02-three-modes'},
    {claim:'Insula neuroplasticity in meditators',refs:'Farb et al. (2013), Fox meta-analysis',doc:'docs/02-three-modes'},
    {claim:'Attachment theory',refs:'Bowlby, Winnicott, Schore',doc:'docs/05-synchronization'},
    {claim:'Inter-brain synchronization',refs:'Czeszumski et al. (2022) — 890 participants',doc:'docs/05-synchronization'},
    {claim:'Close relationship neural sync',refs:'Meta-analysis (2024) — 1,149 dyads',doc:'docs/05-synchronization'},
    {claim:'Interoceptive deficits in neurodegeneration',refs:'Ibáñez et al. (2024) — 7,032 participants',doc:'docs/01-core-model'},
    {claim:'Stochastic resonance in neurons',refs:'Moss et al. (2004)',doc:'docs/04-predictive-loop'},
    {claim:'Cortical reallocation after input loss',refs:'V1 rewires in blind; somatosensory remaps',doc:'docs/02-three-modes'}
  ]},
  2:{label:'Tier 2 — Consistent, Unproven',desc:'Logically coherent with Tier 1, indirect evidence, lacks direct confirmation.',items:[
    {claim:'Two sources of emotional experience',refs:'bvFTD vs. Alzheimer\'s dissociation',doc:'docs/01-core-model'},
    {claim:'Three modes of consciousness',refs:'Neuroplasticity proven; mode framework is extrapolation',doc:'docs/02-three-modes'},
    {claim:'Hierarchical distributed consciousness',refs:'Components proven; unified hierarchy is model',doc:'docs/03-hierarchy'},
    {claim:'ADHD as precision weighting',refs:'Lawson et al. (2017)',doc:'docs/06-calibration'},
    {claim:'Roles block synchronization',refs:'PFC = role hub + sync hub; direct test missing',doc:'docs/05-synchronization'},
    {claim:'Gradient descent in living systems',refs:'Works in domains; generalization is model',doc:'docs/07-gradient-descent'},
    {claim:'Transgenerational calibration transfer',refs:'Yehuda et al.; broader application extrapolated',doc:'docs/06-calibration'},
    {claim:'Phi × interoceptive compression × mode',refs:'Logical IIT extension; no measurement',doc:'docs/08-existing-theories'},
    {claim:'Noise → creativity via network bridging',refs:'Stochastic resonance proven; creativity link extrapolated',doc:'docs/04-predictive-loop'}
  ]},
  3:{label:'Tier 3 — Speculative',desc:'Internally consistent but not testable with current methods.',items:[
    {claim:'Octopus arm has proto-consciousness',refs:'Logically follows; can\'t test subjective experience',doc:'docs/03-hierarchy'},
    {claim:'AI can have symbolic consciousness',refs:'Depends on untestable Mode 2 assumptions',doc:'docs/02-three-modes'},
    {claim:'Esotericism = pre-scientific neuroscience',refs:'Cherry-picking risk',doc:'docs/09-esotericism'},
    {claim:'LSD sequence = evolutionary boot sequence',refs:'Likely pharmacological artifact',doc:'docs/02-three-modes'},
    {claim:'Meta-consciousness (L4) as distinct level',refs:'Hard to distinguish from L3 operationally',doc:'docs/03-hierarchy'}
  ]}
};

marked.setOptions({gfm:true,breaks:false});
var current=null;

function hashToPage(){var h=location.hash.replace('#','');if(!h||h==='/')return'';return h.replace('.md','');}
function pageToFile(p){return p?p+'.md':'README.md';}
function go(p){location.hash=p||'';}
function githubEditUrl(p){return GITHUB_REPO+'/edit/'+GITHUB_BRANCH+'/'+(p?p+'.md':'README.md');}

function rewriteLinks(html,from){
  return html.replace(/href="([^"]*?)"/g,function(full,href){
    if(href.indexOf('http')===0||href.indexOf('#')===0)return full;
    var t=href.replace('.md','');
    if(t.indexOf('../')===0)t=t.replace('../','');
    if(t==='README')t='';
    if(from.indexOf('docs/')===0&&t.indexOf('docs/')!==0&&t!==''&&t!=='CHANGELOG'){if(t.match(/^\d\d-/))t='docs/'+t;}
    return'href="#'+t+'"';
  });
}

function styleTiers(html){
  html=html.replace(/<strong>Tier\s*1([^<]*)<\/strong>/gi,function(m,r){return'<span class="tier tier-1">Tier 1'+r+'</span>';});
  html=html.replace(/<strong>Tier\s*2([^<]*)<\/strong>/gi,function(m,r){return'<span class="tier tier-2">Tier 2'+r+'</span>';});
  html=html.replace(/<strong>Tier\s*3([^<]*)<\/strong>/gi,function(m,r){return'<span class="tier tier-3">Tier 3'+r+'</span>';});
  html=html.replace(/(<td[^>]*>)([^<]*?)(Tier\s+1)/gi,function(m,pre,mid){return pre+mid+'<span class="tier tier-1">Tier 1</span>';});
  html=html.replace(/(<td[^>]*>)([^<]*?)(Tier\s+2)/gi,function(m,pre,mid){return pre+mid+'<span class="tier tier-2">Tier 2</span>';});
  html=html.replace(/(<td[^>]*>)([^<]*?)(Tier\s+3)/gi,function(m,pre,mid){return pre+mid+'<span class="tier tier-3">Tier 3</span>';});
  return html;
}

function buildTierMarkdown(n){
  var d=TIER_DATA[n];if(!d)return'# Not found';
  var md='# **Tier '+n+'** — '+d.label.replace(/Tier \d+ — /,'')+'\n\n'+d.desc+'\n\n**'+d.items.length+' claims**\n\n';
  md+='| Claim | References | Section |\n|-------|-----------|----------|\n';
  d.items.forEach(function(item){
    var sec=TITLES[item.doc]||item.doc||'';
    var link=item.doc?'['+sec+']('+item.doc+'.md)':sec;
    md+='| '+item.claim+' | '+item.refs+' | '+link+' |\n';
  });
  return md;
}

function render(page){
  if(page===current)return;
  current=page;
  var el=document.getElementById('page');
  var sep=document.getElementById('navSep');
  var crumb=document.getElementById('navCrumb');
  var editBtn=document.getElementById('navEdit');
  var isHome=!page;
  var isTier=page.indexOf('tier/')===0;

  sep.style.display=isHome?'none':'';
  crumb.textContent=isHome?'':(TITLES[page]||(isTier&&TIER_DATA[page.charAt(5)]?TIER_DATA[page.charAt(5)].label:page.split('/').pop()));
  el.setAttribute('data-page',isHome?'home':'sub');
  editBtn.style.display=isTier?'none':'';
  if(!isTier)editBtn.href=githubEditUrl(page);
  document.title=isHome?'Consciousness Model v2.3':(TITLES[page]||page)+' — Consciousness Model';

  el.classList.remove('fade-in');void el.offsetWidth;el.classList.add('fade-in');

  // TIER VIEW
  if(isTier){
    var tierMd=buildTierMarkdown(parseInt(page.charAt(5)));
    var h=marked.parse(tierMd);h=rewriteLinks(h,page);h=styleTiers(h);
    var o='<div class="back-row"><a class="back-link" href="#" onclick="go(\'\');return false"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2L4 8l6 6"/></svg>Back to overview</a></div>';
    el.innerHTML=o+'<div class="md">'+h+'</div>';
    window.scrollTo(0,0);return;
  }

  // MARKDOWN VIEW
  el.innerHTML='<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  fetch(pageToFile(page)).then(function(r){if(!r.ok)throw new Error(r.status);return r.text();}).then(function(md){
    var html=marked.parse(md);html=rewriteLinks(html,page);html=styleTiers(html);
    var out='';
    if(!isHome){out+='<div class="back-row"><a class="back-link" href="#" onclick="go(\'\');return false"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2L4 8l6 6"/></svg>Back to overview</a></div>';}
    out+='<div class="md">'+html+'</div>';
    if(isHome)out=injectTierCards(out);
    el.innerHTML=out;window.scrollTo(0,0);
  }).catch(function(err){
    el.innerHTML='<div class="error-box">Could not load <strong>'+pageToFile(page)+'</strong><br><br><a href="#" onclick="go(\'\');return false" style="color:var(--accent);font-family:var(--mono);font-size:13px">Back to overview</a></div>';
  });
}

function injectTierCards(html){
  var marker='Evidence Summary';var idx=html.indexOf(marker);if(idx<0)return html;
  var ulStart=html.indexOf('<ul>',idx);var ulEnd=html.indexOf('</ul>',ulStart);
  if(ulStart<0||ulEnd<0)return html;
  var cards='<div class="tier-cards">';
  [1,2,3].forEach(function(t){
    var d=TIER_DATA[t];
    cards+='<a class="tier-card" data-t="'+t+'" href="#tier/'+t+'">';
    cards+='<div class="tier-card-head"><span class="tier-card-count">'+d.items.length+'</span><span class="tier-card-label">'+d.label+'</span></div>';
    cards+='<p>'+d.desc+'</p></a>';
  });
  cards+='</div>';
  return html.substring(0,ulStart)+cards+html.substring(ulEnd+5);
}

window.addEventListener('hashchange',function(){render(hashToPage());});
render(hashToPage());

var lastY=0;
window.addEventListener('scroll',function(){
  var y=window.pageYOffset;
  document.getElementById('nav').classList.toggle('hidden',y>lastY&&y>80);
  lastY=y;
},{passive:true});
</script>
</body>
</html>
