<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consciousness Model v2.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
:root {
  --bg: #0C0C0E;
  --bg-card: #141418;
  --bg-hover: #1A1A20;
  --text: #C8C8D0;
  --text-dim: #6E6E7A;
  --text-bright: #EAEAF0;
  --accent: #4ECDC4;
  --accent-dim: rgba(78,205,196,0.12);
  --accent2: #FF6B6B;
  --accent3: #FFE66D;
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(78,205,196,0.2);
  --serif: 'Newsreader', Georgia, serif;
  --mono: 'DM Mono', 'Menlo', monospace;
  --max-w: 720px;
  --gutter: 24px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
::selection { background: rgba(78,205,196,0.25); color: var(--text-bright); }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(12,12,14,0.88);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  transition: transform 0.3s ease;
}
nav.hidden { transform: translateY(-100%); }
.nav-inner {
  max-width: var(--max-w); margin: 0 auto;
  padding: 12px var(--gutter);
  display: flex; align-items: center; gap: 10px;
}
.nav-home {
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  color: var(--accent); text-decoration: none; white-space: nowrap;
  transition: opacity 0.2s; cursor: pointer;
}
.nav-home:hover { opacity: 0.7; }
.nav-sep { color: var(--text-dim); font-family: var(--mono); font-size: 12px; }
.nav-crumb {
  font-family: var(--mono); font-size: 12px; color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-spacer { flex: 1; }
.nav-v { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }

/* PAGE */
.page {
  max-width: var(--max-w); margin: 0 auto;
  padding: 112px var(--gutter) 80px;
  min-height: 100vh;
}
.page.fade-in { animation: fadeIn 0.35s ease forwards; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* BACK */
.back-row {
  margin-bottom: 28px;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 13px; color: var(--accent);
  text-decoration: none; transition: opacity 0.2s; cursor: pointer;
}
.back-link:hover { opacity: 0.7; }

/* MARKDOWN */
.md h1 {
  font-family: var(--serif);
  font-size: clamp(28px,6vw,42px); font-weight: 300;
  color: var(--text-bright); line-height: 1.2;
  margin: 0 0 8px; padding-bottom: 16px;
}
.md h2 {
  font-family: var(--serif);
  font-size: clamp(21px,4.5vw,27px); font-weight: 400;
  color: var(--text-bright); line-height: 1.3;
  margin: 48px 0 16px; padding-top: 32px;
  border-top: 1px solid var(--border);
}
.md h3 {
  font-family: var(--serif); font-size: 19px; font-weight: 500;
  color: var(--text-bright); margin: 32px 0 10px;
}
.md h4 {
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  color: var(--accent); letter-spacing: 0.04em; margin: 24px 0 8px;
}
.md p { margin: 0 0 16px; }
.md ul, .md ol { margin: 0 0 16px; padding-left: 22px; }
.md li { margin-bottom: 6px; }
.md li::marker { color: var(--accent); }
.md strong { color: var(--text-bright); font-weight: 600; }
.md em { font-style: italic; color: var(--accent); }
.md hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

.md blockquote {
  border-left: 3px solid var(--accent2);
  padding: 8px 0 8px 20px; margin: 20px 0;
  color: var(--text-dim); font-style: italic;
}
.md blockquote p:last-child { margin-bottom: 0; }

.md code {
  font-family: var(--mono); font-size: 0.88em;
  background: rgba(78,205,196,0.08); color: var(--accent);
  padding: 2px 6px; border-radius: 4px;
}
.md pre {
  background: rgba(78,205,196,0.05);
  border: 1px solid rgba(78,205,196,0.12);
  border-radius: 10px; padding: 16px 20px; margin: 20px 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.md pre code {
  background: none; padding: 0; font-size: 13px; line-height: 1.6; color: var(--accent);
}

/* TABLES */
.md table {
  width: 100%; border-collapse: collapse; font-size: 14px;
  margin: 20px 0; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.md thead { border-bottom: 1px solid var(--border-accent); }
.md th {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--accent); text-align: left; padding: 10px 12px; white-space: nowrap;
}
.md td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.md tr:last-child td { border-bottom: none; }

/* LINKS */
.md a {
  color: var(--accent); text-decoration: none;
  border-bottom: 1px solid rgba(78,205,196,0.25);
  transition: border-color 0.2s;
}
.md a:hover { border-color: var(--accent); }

/* README doc link tables → card rows */
.page[data-page="home"] .md table { display: table; border-collapse: separate; border-spacing: 0 4px; }
.page[data-page="home"] .md td {
  background: var(--bg-card); border-bottom: none;
  padding: 12px 16px; transition: background 0.2s; cursor: pointer;
}
.page[data-page="home"] .md td:first-child { border-radius: 8px 0 0 8px; font-weight: 500; }
.page[data-page="home"] .md td:last-child { border-radius: 0 8px 8px 0; color: var(--text-dim); font-size: 15px; }
.page[data-page="home"] .md tr:hover td { background: var(--bg-hover); }
.page[data-page="home"] .md th { padding: 6px 16px; }

/* FOOTER */
.foot {
  max-width: var(--max-w); margin: 0 auto;
  padding: 32px var(--gutter) 64px;
  border-top: 1px solid var(--border);
  font-family: var(--mono); font-size: 12px;
  color: var(--text-dim); text-align: center;
}

/* LOADING */
.loader {
  display: flex; align-items: center; justify-content: center; gap: 8px; padding: 140px 0;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); opacity: 0.4;
  animation: ldot 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.15s; }
.dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes ldot {
  0%,80%,100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1); opacity: 0.8; }
}

/* TIER FILTER BAR */
.filter-bar {
  position: fixed; top: 46px; left: 0; right: 0; z-index: 99;
  background: rgba(12,12,14,0.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  transition: transform 0.3s ease, opacity 0.3s ease;
}
nav.hidden + .filter-bar, .filter-bar.hidden { transform: translateY(calc(-100% - 46px)); }
.filter-inner {
  max-width: var(--max-w); margin: 0 auto;
  padding: 8px var(--gutter);
  display: flex; align-items: center; gap: 8px;
}
.filter-label {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-dim); letter-spacing: 0.06em;
  text-transform: uppercase; margin-right: 4px; white-space: nowrap;
}
.filter-btn {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  padding: 5px 12px; border-radius: 6px;
  cursor: pointer; transition: all 0.2s;
  border: 1px solid transparent;
  user-select: none; -webkit-user-select: none;
  white-space: nowrap;
}
.filter-btn[data-tier="1"] {
  background: rgba(46,204,113,0.15); color: #2ecc71; border-color: rgba(46,204,113,0.3);
}
.filter-btn[data-tier="1"].off {
  background: transparent; color: var(--text-dim); border-color: var(--border);
}
.filter-btn[data-tier="2"] {
  background: rgba(243,156,18,0.15); color: #f39c12; border-color: rgba(243,156,18,0.3);
}
.filter-btn[data-tier="2"].off {
  background: transparent; color: var(--text-dim); border-color: var(--border);
}
.filter-btn[data-tier="3"] {
  background: rgba(231,76,60,0.15); color: #e74c3c; border-color: rgba(231,76,60,0.3);
}
.filter-btn[data-tier="3"].off {
  background: transparent; color: var(--text-dim); border-color: var(--border);
}
.filter-btn:hover { opacity: 0.85; }
.filter-spacer { flex: 1; }
.filter-reset {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-dim); background: none; border: none;
  cursor: pointer; padding: 4px 8px; transition: color 0.2s;
  white-space: nowrap;
}
.filter-reset:hover { color: var(--text); }

/* FILTERED CONTENT */
[data-tier-section] { transition: opacity 0.25s ease, max-height 0.35s ease; }
[data-tier-section].tier-hidden {
  opacity: 0.08;
  pointer-events: none;
  max-height: 60px;
  overflow: hidden;
  position: relative;
}
[data-tier-section].tier-hidden::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
  background: linear-gradient(transparent, var(--bg));
}
tr[data-tier-row].tier-hidden {
  opacity: 0.08;
}
tr[data-tier-row].tier-hidden td {
  max-height: 0; padding-top: 0; padding-bottom: 0;
  overflow: hidden; border: none;
  transition: all 0.25s ease;
}

/* Adjust page padding for filter bar — handled in .page rule */

/* TIER BADGES */
.tier {
  display: inline-block;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 5px;
  margin: 2px 2px;
  letter-spacing: 0.02em;
  vertical-align: middle;
  line-height: 1.4;
}
.tier-1 {
  background: rgba(46,204,113,0.15);
  color: #2ecc71;
  border: 1px solid rgba(46,204,113,0.3);
}
.tier-2 {
  background: rgba(243,156,18,0.15);
  color: #f39c12;
  border: 1px solid rgba(243,156,18,0.3);
}
.tier-3 {
  background: rgba(231,76,60,0.15);
  color: #e74c3c;
  border: 1px solid rgba(231,76,60,0.3);
}

/* Tier badges in evidence tiers page — larger */
.tier-block {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--bg-card);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
}
.tier-block .tier { flex-shrink: 0; font-size: 11px; }
.tier-block p { margin: 0; font-size: 15px; }

.error-box {
  text-align: center; padding: 120px var(--gutter);
  font-family: var(--mono); font-size: 14px; color: var(--accent2);
}

@media (max-width: 480px) {
  :root { --gutter: 16px; }
  body { font-size: 16px; }
  .md table { font-size: 13px; }
  .md th, .md td { padding: 8px 8px; }
  .page { padding-top: 100px; }
}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-inner">
    <a class="nav-home" id="navHome" onclick="go('');return false;" href="#">Consciousness Model</a>
    <span class="nav-sep" id="navSep" style="display:none">/</span>
    <span class="nav-crumb" id="navCrumb"></span>
    <span class="nav-spacer"></span>
    <span class="nav-v">v2.3</span>
  </div>
</nav>

<div class="filter-bar" id="filterBar">
  <div class="filter-inner">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn" data-tier="1" onclick="toggleFilter(1)">Tier 1</button>
    <button class="filter-btn" data-tier="2" onclick="toggleFilter(2)">Tier 2</button>
    <button class="filter-btn" data-tier="3" onclick="toggleFilter(3)">Tier 3</button>
    <span class="filter-spacer"></span>
    <button class="filter-reset" id="filterReset" onclick="resetFilters()" style="display:none">Reset</button>
  </div>
</div>

<main class="page fade-in" id="page" data-page="home"></main>

<footer class="foot">
  Polášek + Claude &middot; March 2026 &middot; Not peer-reviewed science.
</footer>

<script>
var TITLES = {
  '': 'Consciousness Model v2.3',
  'docs/01-core-model': 'Core Model',
  'docs/02-three-modes': 'Three Modes',
  'docs/03-hierarchy': 'Hierarchy',
  'docs/04-predictive-loop': 'Predictive Loop',
  'docs/05-synchronization': 'Synchronization',
  'docs/06-calibration': 'Calibration',
  'docs/07-gradient-descent': 'Gradient Descent',
  'docs/08-existing-theories': 'Existing Theories',
  'docs/09-esotericism': 'Esotericism',
  'docs/10-evidence-tiers': 'Evidence Tiers',
  'docs/11-open-questions': 'Open Questions',
  'docs/12-peer-review': 'Peer Review',
  'CHANGELOG': 'Changelog'
};

marked.setOptions({ gfm: true, breaks: false });

var current = null;

function hashToPage() {
  var h = location.hash.replace('#','');
  if (!h || h === '/') return '';
  return h.replace('.md','');
}

function pageToFile(p) {
  if (!p) return 'README.md';
  return p + '.md';
}

function go(p) {
  location.hash = p || '';
}

function rewriteLinks(html, fromPage) {
  // Rewrite .md hrefs to hash links
  return html.replace(/href="([^"]*?)"/g, function(full, href) {
    // Skip external links
    if (href.indexOf('http') === 0) return full;
    // Skip anchors
    if (href.indexOf('#') === 0) return full;

    var target = href.replace('.md','');

    // Resolve ../README from docs/ pages
    if (target.indexOf('../') === 0) {
      target = target.replace('../','');
    }
    if (target === 'README') target = '';

    // Resolve relative from docs/
    if (fromPage.indexOf('docs/') === 0 && target.indexOf('docs/') !== 0 && target !== '' && target !== 'CHANGELOG') {
      // Sibling doc link like 05-synchronization.md from within docs/
      if (target.match(/^\d\d-/)) {
        target = 'docs/' + target;
      }
    }

    return 'href="#' + target + '"';
  });
}

function styleTiers(html) {
  // Pass 1: Bold wrapped — <strong>Tier N...</strong>
  html = html.replace(/<strong>Tier\s*1([^<]*)<\/strong>/gi, function(m, rest) {
    return '<span class="tier tier-1">Tier 1' + rest + '</span>';
  });
  html = html.replace(/<strong>Tier\s*2([^<]*)<\/strong>/gi, function(m, rest) {
    return '<span class="tier tier-2">Tier 2' + rest + '</span>';
  });
  html = html.replace(/<strong>Tier\s*3([^<]*)<\/strong>/gi, function(m, rest) {
    return '<span class="tier tier-3">Tier 3' + rest + '</span>';
  });

  // Pass 2: Standalone Tier N in table cells or plain text (not already inside a span)
  html = html.replace(/(<td[^>]*>)([^<]*?)(Tier\s+1)/gi, function(m, pre, mid, t) {
    return pre + mid + '<span class="tier tier-1">Tier 1</span>';
  });
  html = html.replace(/(<td[^>]*>)([^<]*?)(Tier\s+2)/gi, function(m, pre, mid, t) {
    return pre + mid + '<span class="tier tier-2">Tier 2</span>';
  });
  html = html.replace(/(<td[^>]*>)([^<]*?)(Tier\s+3)/gi, function(m, pre, mid, t) {
    return pre + mid + '<span class="tier tier-3">Tier 3</span>';
  });

  return html;
}

function render(page) {
  if (page === current) return;
  current = page;

  var el = document.getElementById('page');
  var sep = document.getElementById('navSep');
  var crumb = document.getElementById('navCrumb');
  var isHome = !page;

  // Breadcrumb
  sep.style.display = isHome ? 'none' : '';
  crumb.textContent = isHome ? '' : (TITLES[page] || page.split('/').pop());
  el.setAttribute('data-page', isHome ? 'home' : 'sub');

  // Title
  document.title = isHome ? 'Consciousness Model v2.3' : (TITLES[page] || page) + ' — Consciousness Model';

  // Loading
  el.innerHTML = '<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  // Restart animation
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');

  var file = pageToFile(page);

  fetch(file).then(function(r) {
    if (!r.ok) throw new Error(r.status);
    return r.text();
  }).then(function(md) {
    var html = marked.parse(md);
    html = rewriteLinks(html, page);
    html = styleTiers(html);

    var out = '';

    // Back link for sub-pages
    if (!isHome) {
      out += '<div class="back-row"><a class="back-link" href="#" onclick="go(\'\');return false;">';
      out += '<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2L4 8l6 6"/></svg>';
      out += 'Back to overview</a></div>';
    }

    out += '<div class="md">' + html + '</div>';
    el.innerHTML = out;
    tagTierSections();
    applyFilters();
    window.scrollTo(0, 0);

  }).catch(function(err) {
    el.innerHTML = '<div class="error-box">Could not load <strong>' + file + '</strong><br><br>'
      + '<a href="#" onclick="go(\'\');return false;" style="color:var(--accent);font-family:var(--mono);font-size:13px;">Back to overview</a></div>';
  });
}

// ---- TIER FILTERING ----

var activeTiers = { 1: true, 2: true, 3: true };

function detectTiers(el) {
  var tiers = [];
  if (el.querySelector('.tier-1') || el.innerHTML.match(/tier-1/)) tiers.push(1);
  if (el.querySelector('.tier-2') || el.innerHTML.match(/tier-2/)) tiers.push(2);
  if (el.querySelector('.tier-3') || el.innerHTML.match(/tier-3/)) tiers.push(3);
  return tiers;
}

function tagTierSections() {
  var mdEl = document.querySelector('.md');
  if (!mdEl) return;

  // Strategy 1: Tag sections (h2 and everything until next h2)
  var children = Array.from(mdEl.children);
  var sectionEls = [];
  var currentGroup = [];
  var groupTiers = [];

  children.forEach(function(child, i) {
    var isH2 = child.tagName === 'H2';
    var isLast = i === children.length - 1;

    if (isH2 && currentGroup.length > 0) {
      // Wrap previous group
      finishGroup(currentGroup, groupTiers, mdEl, sectionEls);
      currentGroup = [];
      groupTiers = [];
    }

    currentGroup.push(child);
    var ct = detectTiers(child);
    ct.forEach(function(t) { if (groupTiers.indexOf(t) < 0) groupTiers.push(t); });

    if (isLast && currentGroup.length > 0) {
      finishGroup(currentGroup, groupTiers, mdEl, sectionEls);
    }
  });

  // Strategy 2: Tag individual table rows
  mdEl.querySelectorAll('tr').forEach(function(tr) {
    var rt = detectTiers(tr);
    if (rt.length > 0) {
      tr.setAttribute('data-tier-row', rt.join(','));
    }
  });

  // Strategy 3: Tag list items
  mdEl.querySelectorAll('li').forEach(function(li) {
    var lt = detectTiers(li);
    if (lt.length > 0) {
      li.setAttribute('data-tier-section', lt.join(','));
    }
  });
}

function finishGroup(group, tiers, parent, out) {
  if (tiers.length === 0) return;
  // Wrap group in a div with tier data
  var wrapper = document.createElement('div');
  wrapper.setAttribute('data-tier-section', tiers.join(','));
  // Insert wrapper before first element of group
  parent.insertBefore(wrapper, group[0]);
  group.forEach(function(el) { wrapper.appendChild(el); });
  out.push(wrapper);
}

function toggleFilter(tier) {
  activeTiers[tier] = !activeTiers[tier];
  applyFilters();
}

function resetFilters() {
  activeTiers = { 1: true, 2: true, 3: true };
  applyFilters();
}

function applyFilters() {
  var allActive = activeTiers[1] && activeTiers[2] && activeTiers[3];

  // Update buttons
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    var t = parseInt(btn.getAttribute('data-tier'));
    btn.classList.toggle('off', !activeTiers[t]);
  });

  // Show/hide reset
  document.getElementById('filterReset').style.display = allActive ? 'none' : '';

  // Filter sections
  document.querySelectorAll('[data-tier-section]').forEach(function(el) {
    var tiers = el.getAttribute('data-tier-section').split(',').map(Number);
    var visible = allActive || tiers.some(function(t) { return activeTiers[t]; });
    el.classList.toggle('tier-hidden', !visible);
  });

  // Filter table rows
  document.querySelectorAll('[data-tier-row]').forEach(function(tr) {
    var tiers = tr.getAttribute('data-tier-row').split(',').map(Number);
    var visible = allActive || tiers.some(function(t) { return activeTiers[t]; });
    tr.classList.toggle('tier-hidden', !visible);
  });
}

window.addEventListener('hashchange', function() { render(hashToPage()); });
render(hashToPage());

// Nav + filter bar auto-hide
var lastY = 0;
window.addEventListener('scroll', function() {
  var y = window.pageYOffset;
  var hide = y > lastY && y > 80;
  document.getElementById('nav').classList.toggle('hidden', hide);
  document.getElementById('filterBar').classList.toggle('hidden', hide);
  lastY = y;
}, { passive: true });
</script>

</body>
</html>
